name: tui-test

permissions:
  pull-requests: read
  contents: read

on:
  push:
    branches:
      - master

  pull_request:

jobs:
  tui-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [stable]

    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
      -
        name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        env:
          GOEXPERIMENT: jsonv2
        with:
          version: latest
          only-new-issues: true
          working-directory: cmd/genspec-tui
      -
        name: Test the TUI CLI
        env:
          GOEXPERIMENT: jsonv2
        run: >
          cd cmd/genspec-tui
          go test -race -count=1
          -coverprofile='genspec-tui.coverage.ubuntu-latest-${{ matrix.go-version }}.out'
          -covermode=atomic
          -coverpkg='github.com/go-openapi/codescan'
          ./...
      -
        name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: 'genspec-tui.coverage.ubuntu-latest-${{ matrix.go-version }}.out'
          name: 'genspec-tui.coverage.ubuntu-latest-${{ matrix.go-version }}'
          retention-days: 1

  collect-coverage:
    needs: [tui-test]
    if: ${{ !cancelled() && needs.tui-test.result == 'success' }}
    uses: go-openapi/ci-workflows/.github/workflows/collect-coverage.yml@f00f5763ddb0c59105de5f565da8cac323fce2bf # v0.3.5
    secrets: inherit
