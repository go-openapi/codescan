version: "2"
linters:
  default: all
  disable:
    - depguard
    - funlen
    - gomoddirectives # mono-repo, multi-modules (docs/examples): local replace directives are needed for proper releasing
    - goconst # disabled, perhaps temporarily as this linter has become way too pick and noisy
    - godox
    - gomodguard
    - gomodguard_v2
    - exhaustruct
    - ireturn # not suited to the design of this repo
    - nlreturn
    - nonamedreturns
    - noinlineerr
    - paralleltest
    - recvcheck
    - testpackage
    - thelper
    - tparallel
    - varnamelen
    - whitespace
    - wrapcheck
    - wsl
    - wsl_v5
  settings:
    dupl:
      threshold: 200
    goconst:
      min-len: 2
      min-occurrences: 3
    cyclop:
      max-complexity: 30
    gocyclo:
      min-complexity: 30
    gocognit:
      min-complexity: 35
    exhaustive:
      default-signifies-exhaustive: true
      default-case-required: true
    lll:
      line-length: 180
    maintidx:
      under: 15
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - fixtures
      - third_party$
      - builtin$
      - examples$
issues:
  # Maximum issues count per one linter.
  # Set to 0 to disable.
  # Default: 50
  max-issues-per-linter: 0
  # Maximum count of issues with the same text.
  # Set to 0 to disable.
  # Default: 3
  max-same-issues: 0
