<style>
:root {
  --INTERNAL-MAIN-MAX-width: var(--MENU-MAX-width, var(--MAIN-WIDTH-MAX, 125.0rem));
}
.inline-badge > a,img {
  /* This allows a markdown badge to remain left-aligned */
  margin: 10px !important;
}
.card-container > li:only-child {
  /* When a card container has a single card (e.g. one code example per tab),
     span the full grid width instead of being squished to 1/3. */
  grid-column: 1 / -1;
}
.card-container:has(> li:nth-child(2)):not(:has(> li:nth-child(3))) {
  /* Auto-adapt to 2 columns when a container has exactly 2 cards. */
  grid-template-columns: repeat(2, 1fr);
}
.card-container .card {
  /* Relearn's theme.css caps cards at max-height: 600px with overflow: hidden,
     which truncates long testable examples. Let them grow vertically and
     scroll when needed. */
  max-height: none;
  overflow-y: auto;
}
.card-container .card pre {
  /* Ensure horizontal scrolling on long lines inside code blocks. */
  overflow-x: auto;
  white-space: pre;
}
.example-grid {
  /* The `example` shortcode: annotated Go (left) next to the spec it
     produces (right). Two columns on wide screens, stacked on narrow. */
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 1rem;
  margin: 1rem 0;
}
@media (max-width: 60rem) {
  .example-grid { grid-template-columns: 1fr; }
}
.example-grid .example-pane {
  min-width: 0; /* let code blocks shrink and scroll, not overflow the grid */
}
.example-grid .example-label {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  opacity: 0.7;
  margin-bottom: 0.25rem;
}
.example-grid pre {
  overflow-x: auto;
  white-space: pre;
}
.example-grid .code-source {
  margin-top: 0.25rem;
  font-size: 0.8rem;
}
/* examplelive: the right card's Spec | SwaggerUI tabs (tabbed-example pilot). */
.examplelive .el-right { min-width: 0; }
.examplelive .el-tabs {
  display: flex;
  gap: 0.25rem;
  margin-bottom: 0.5rem;
}
.examplelive .el-tab {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 0.25rem 0.85rem;
  border: 1px solid rgba(127, 127, 127, 0.4);
  border-radius: 4px 4px 0 0;
  background: transparent;
  color: inherit;
  opacity: 0.55;
  cursor: pointer;
}
.examplelive .el-tab.active {
  opacity: 1;
  border-bottom-color: transparent;
  background: rgba(127, 127, 127, 0.12);
}
.examplelive .el-panel { display: none; }
.examplelive .el-panel.active { display: block; }
</style>
<script>
  // examplelive: wire the `example` shortcode's right-card Spec | SwaggerUI tabs
  // (rendered when the shortcode is given a `full=` whole-spec golden) and
  // lazily render Swagger UI into each one the first time it is revealed.
  //
  // Swagger UI cannot paint inside a display:none tab panel (its iframe needs a
  // laid-out ancestor), so each `.el-openapi` container is rendered on demand.
  // We render into a per-widget iframe (CSS isolation) with a UNIQUE id derived
  // from the container, so multiple live examples can coexist on one page —
  // mirroring the theme's own openapi render but without its single fixed id.
  // Assets (SwaggerUIBundle, swagger CSS) are loaded by the theme because the
  // shortcode sets the page's `hasOpenApi` store flag. See
  // .claude/plans/tabbed-examples.md.
  (function () {
    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue('--' + name).trim();
    }
    function renderOpenapi(container) {
      if (container.dataset.elRendered) return;
      var r = window.relearn || {};
      var cfg = r.themeUseOpenapi;
      if (!window.SwaggerUIBundle || !window.SwaggerUIStandalonePreset || !cfg) {
        // assets still loading (deferred scripts) — retry shortly
        setTimeout(function () { renderOpenapi(container); }, 150);
        return;
      }
      container.dataset.elRendered = '1';
      var base = r.relBasePath || '';
      var buster = cfg.assetsBuster || '';
      var min = r.min || '';
      var mode = cssVar('OPENAPI-theme') || 'light';
      var variant = document.documentElement.dataset.rThemeVariant || '';
      var innerId = container.id + '-ui';
      var frame = document.createElement('iframe');
      frame.className = 'sc-openapi-iframe';
      frame.title = 'Rendered API documentation';
      frame.style.width = '100%';
      frame.style.border = '0';
      frame.srcdoc =
        '<!doctype html><html class="relearn ' + mode + '-mode" data-r-output-format="html" data-r-theme-variant="' + variant + '">' +
        '<head><meta charset="utf-8">' +
        '<link rel="stylesheet" href="' + cfg.css + buster + '">' +
        '<link rel="stylesheet" href="' + base + '/css/swagger' + min + '.css' + buster + '">' +
        '<link rel="stylesheet" href="' + base + '/css/format-html' + min + '.css' + buster + '">' +
        '</head><body><div id="' + innerId + '"></div></body></html>';
      frame.onload = function () {
        try {
          var doc = frame.contentWindow.document;
          window.SwaggerUIBundle({
            domNode: doc.getElementById(innerId),
            url: container.dataset.specUrl,
            presets: [window.SwaggerUIBundle.presets.apis, window.SwaggerUIStandalonePreset],
            plugins: [window.SwaggerUIBundle.plugins.DownloadUrl],
            layout: 'BaseLayout',
            docExpansion: 'list',
            defaultModelsExpandDepth: 1,
            defaultModelExpandDepth: 2,
            filter: true,
            validatorUrl: 'none',
          });
          var resize = function () {
            var h = doc.documentElement.getBoundingClientRect().height;
            if (h) frame.style.height = h + 'px';
          };
          new MutationObserver(resize).observe(doc.documentElement, { childList: true, subtree: true });
          setTimeout(resize, 400);
          window.addEventListener('resize', resize);
        } catch (e) {
          console.error('examplelive: SwaggerUI render failed', e);
        }
      };
      container.appendChild(frame);
    }
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.examplelive').forEach(function (box) {
        var tabs = box.querySelectorAll('.el-tab');
        var panels = box.querySelectorAll('.el-panel');
        tabs.forEach(function (tab) {
          tab.addEventListener('click', function () {
            var target = tab.dataset.elTarget;
            tabs.forEach(function (t) {
              var on = t === tab;
              t.classList.toggle('active', on);
              t.setAttribute('aria-selected', on ? 'true' : 'false');
            });
            panels.forEach(function (p) {
              p.classList.toggle('active', p.dataset.elPanel === target);
            });
            if (target === 'swaggerui') {
              var c = box.querySelector('.el-openapi');
              if (c) renderOpenapi(c);
            }
          });
        });
      });
    });
  })();
</script>

<style>
  /* railroad: Mermaid railroad (syntax) diagrams from the `railroad` shortcode */
  .railroad-diagram { overflow-x: auto; margin: .4rem 0 1.4rem; }
  .railroad-diagram svg { max-width: none; height: auto; }
  .railroad-err { color: #b00; white-space: pre-wrap; font-size: .85rem; }
</style>
<script>
  // railroad: render the railroad shortcode's EBNF blocks as Mermaid railroad
  // (syntax) diagrams. Self-gating — Mermaid (11.16, railroad is beta) is loaded
  // only on pages that actually contain a .railroad-diagram, and only at
  // runtime. Each diagram is rendered in ISOLATION via mermaid.render(uniqueId,
  // ...), sequentially: the beta railroad renderer collides when several
  // diagrams are batched through mermaid.run(). Mermaid is vendored locally
  // (themes/codescan-static/js/mermaid11) so the site stays offline-clean.
  // Re-renders on theme change to track the light/dark variant.
  (function () {
    var SRC = '{{ relURL "js/mermaid11/mermaid.min.js" }}';
    // Quote bare UPPERCASE_LEXER_TOKENS so railroad-ebnf renders them as
    // terminals (literal boxes) rather than non-terminal references.
    function quoteTerminals(s) {
      return s.replace(/\b[A-Z][A-Z0-9_]*[A-Z0-9]\b/g, '"$&"');
    }
    // Match the diagram to the site's light/dark variant by sampling the page
    // background luminance (robust across Relearn's many theme variants).
    function siteIsDark() {
      var bg = getComputedStyle(document.body).backgroundColor || '';
      var m = bg.match(/\d+/g);
      if (!m || m.length < 3) return false;
      return (0.2126 * +m[0] + 0.7152 * +m[1] + 0.0722 * +m[2]) < 128;
    }
    // The first render replaces the container's <script> with the SVG, so stash
    // the source on the element to allow re-rendering on a theme switch.
    function ebnfOf(el) {
      if (!el.dataset.rrSrc) {
        var s = el.querySelector('.railroad-src');
        el.dataset.rrSrc = s ? s.textContent.trim() : '';
      }
      return el.dataset.rrSrc;
    }
    var rrSeq = 0;
    async function renderAll(mermaid) {
      mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        theme: siteIsDark() ? 'dark' : 'default',
      });
      var blocks = [].slice.call(document.querySelectorAll('.railroad-diagram'));
      for (var i = 0; i < blocks.length; i++) {
        var el = blocks[i];
        var ebnf = quoteTerminals(ebnfOf(el));
        if (!ebnf) continue;
        try {
          var out = await mermaid.render('rrsvg-' + (rrSeq++), 'railroad-ebnf-beta\n' + ebnf);
          el.innerHTML = out.svg;
        } catch (e) {
          el.innerHTML = '<pre class="railroad-err">railroad render failed: ' +
            (e && e.message ? e.message : e) + '</pre>';
        }
      }
    }
    function withMermaid(cb) {
      if (window.mermaid && window.mermaid.render) { cb(window.mermaid); return; }
      var s = document.createElement('script');
      s.src = SRC;
      s.onload = function () { cb(window.mermaid); };
      s.onerror = function () {
        document.querySelectorAll('.railroad-diagram').forEach(function (el) {
          el.innerHTML = '<pre class="railroad-err">railroad: failed to load Mermaid</pre>';
        });
      };
      document.head.appendChild(s);
    }
    document.addEventListener('DOMContentLoaded', function () {
      if (!document.querySelector('.railroad-diagram')) return;
      withMermaid(renderAll);
      // Relearn fires this on the document when the light/dark variant changes.
      document.addEventListener('themeVariantLoaded', function () {
        if (window.mermaid && window.mermaid.render) renderAll(window.mermaid);
      });
    });
  })();
</script>
